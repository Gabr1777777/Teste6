<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>XatSpace – Namee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#6b0000,#7a0000,#910000);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* CONTENEDOR PRINCIPAL (YA EXISTÍA) */
.wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

/* BOTONES PEGADOS A LA CARD */
.menu-left{
  position:absolute;
  left:-100px;       /* pegado a la card */
  top:36%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
}
.menu-left button{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  color:#fff;
  width:80px;
  height:80px;
  border-radius:15px;
  cursor:pointer;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:all 0.4s ease;
}
.menu-left button:hover{
  background:rgba(255,255,255,0.2);
  transform:scale(1.05);
}
.menu-left button i{
  font-size:24px;
  margin-bottom:5px;
}

/* LA CARD PRINCIPAL */
.card{
  width:380px;
  height:540px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:40px;
  position:relative;
  z-index:2;
  box-shadow:0 25px 50px rgba(0,0,0,0.5);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
  transition:all 0.6s ease;
}

.card:hover{
  box-shadow:0 30px 60px rgba(107,0,0,0.4);
}

.avatar-container{
  position:relative;
  margin-bottom:25px;
}

.avatar{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid rgba(255,255,255,0.1);
  padding:5px;
  transition:transform 0.5s ease;
}

.avatar:hover{
  transform:rotate(5deg) scale(1.05);
}

.status-badge{
  position:absolute;
  bottom:10px;
  right:10px;
  width:22px;
  height:22px;
  background:#00ff88;
  border:4px solid #1a1a1a;
  border-radius:50%;
  box-shadow:0 0 15px #00ff88;
}

.info h1{
  color:#fff;
  font-family:'Playfair Display',serif;
  font-size:32px;
  margin:0;
  letter-spacing:2px;
  text-align:center;
}

.info p{
  color:rgba(255,255,255,0.6);
  font-size:14px;
  margin:10px 0 25px;
  text-align:center;
  letter-spacing:1px;
}

.stats{
  display:flex;
  gap:25px;
  margin-bottom:30px;
}

.stat-item{
  text-align:center;
}

.stat-value{
  display:block;
  color:#fff;
  font-weight:600;
  font-size:18px;
}

.stat-label{
  color:rgba(255,255,255,0.4);
  font-size:11px;
  text-transform:uppercase;
}

/* BOTONES DE LA CARD */
.actions{
  display:flex;
  flex-direction:column;
  gap:15px;
  width:100%;
  padding:0 30px;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:15px;
  border:none;
  font-family:'Poppins',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.3s ease;
  text-transform:uppercase;
  letter-spacing:1px;
}

.btn-primary{
  background:#fff;
  color:#000;
}

.btn-primary:hover{
  background:#6b0000;
  color:#fff;
  transform:translateY(-2px);
}

.btn-secondary{
  background:rgba(255,255,255,0.08);
  color:#fff;
  border:1px solid rgba(255,255,255,0.1);
}

.btn-secondary:hover{
  background:rgba(255,255,255,0.15);
}

/* SOCIAL FLOATING */
.social-links{
  position:absolute;
  bottom:30px;
  display:flex;
  gap:15px;
}

.social-links a{
  color:rgba(255,255,255,0.4);
  font-size:18px;
  transition:color 0.3s;
  text-decoration:none;
}

.social-links a:hover{
  color:#fff;
}

/* INTRO SCREEN */
.intro{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:#000;
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.intro-btn{
  padding:15px 40px;
  background:none;
  border:2px solid #6b0000;
  color:#6b0000;
  font-family:'Playfair Display',serif;
  font-size:24px;
  cursor:pointer;
  transition:all 0.5s;
  letter-spacing:4px;
}

.intro-btn:hover{
  background:#6b0000;
  color:#fff;
  box-shadow:0 0 30px #6b0000;
}

/* PLAYER DROP DOWN */
.player-drop{
  position:absolute;
  top:-120px;
  width:100%;
  height:100px;
  transition:all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  opacity:0;
  pointer-events:none;
}

.player-drop.active{
  top:-110px;
  opacity:1;
  pointer-events:all;
}

.player-glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.music-title{
  color:rgba(255,255,255,0.4);
  font-size:10px;
  text-transform:uppercase;
  margin-bottom:5px;
}

.song-name{
  color:#fff;
  font-size:13px;
  white-space:nowrap;
  overflow:hidden;
  width:200px;
  text-align:center;
}

.player-controls{
  display:flex;
  gap:15px;
  margin-top:10px;
}

.player-controls button{
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
  font-size:16px;
  opacity:0.7;
  transition:opacity 0.3s;
}

.player-controls button:hover{
  opacity:1;
}

.progress{
  width:100%;
  height:3px;
  background:rgba(255,255,255,0.1);
  margin-top:10px;
  border-radius:5px;
  -webkit-appearance: none;
}

.progress::-webkit-slider-thumb{
  -webkit-appearance: none;
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  cursor:pointer;
}

/* FONDOS Y EFECTOS */
.bg-video{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0.4;
}

.overlay-red{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:radial-gradient(circle, transparent 20%, #000 150%);
  z-index:0;
  pointer-events:none;
}

/* MODALES */
.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  z-index:1000;
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.active{
  display:flex;
}

.modal-content{
  width:500px;
  background:rgba(20,20,20,0.9);
  border:1px solid #6b0000;
  padding:40px;
  border-radius:20px;
  position:relative;
}

.close-modal{
  position:absolute;
  top:20px;right:20px;
  color:#fff;
  font-size:24px;
  cursor:pointer;
}

/* GALERIA MODAL ESPECÍFICO */
#galeriaModal .modal-content{
  width:800px;
  height:500px;
  padding:0;
  overflow:hidden;
  background:none;
  border:none;
}

.slider-container{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slide{
  position:absolute;
  width:300px;
  height:400px;
  border-radius:20px;
  background-size:cover;
  background-position:center;
  transition:all 0.5s ease;
  filter:brightness(0.3);
  transform:scale(0.8) translateX(0);
  z-index:1;
}

.slide.active{
  z-index:10;
  filter:brightness(1);
  transform:scale(1.1) translateX(0);
  box-shadow:0 20px 40px rgba(0,0,0,0.8);
}

.slide.left{
  transform:scale(0.8) translateX(-250px);
  z-index:5;
}

.slide.right{
  transform:scale(0.8) translateX(250px);
  z-index:5;
}

.nav-slider{
  position:absolute;
  bottom:20px;
  display:flex;
  gap:20px;
  z-index:20;
}

.nav-slider button{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  padding:10px 20px;
  cursor:pointer;
  border-radius:10px;
}

/* FRIEND MODAL */
.friend-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:20px;
}
.friend-card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
}
.friend-card img{
  width:70px;
  height:70px;
  border-radius:50%;
  margin-bottom:10px;
}
.friend-card h3{
  color:#fff;
  margin:0;
  font-size:16px;
}
.friend-card p{
  color:#6b0000;
  margin:5px 0 0;
  font-size:12px;
}

/* MARRIED MODAL */
.married-content{
  text-align:center;
}
.married-content img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #6b0000;
  margin-bottom:20px;
}
.married-content h2{
  color:#fff;
  font-family:'Playfair Display',serif;
}
.married-content p{
  color:rgba(255,255,255,0.6);
  font-style:italic;
}

/* SPARKLE EFFECT */
.sparkle{
  position:fixed;
  width:4px;
  height:4px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  animation:fly 1.5s linear forwards;
}

@keyframes fly{
  0%{transform:translate(0,0) scale(1); opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(0); opacity:0}
}


.corazon-xat {
    position: fixed;
    color: #6b0000;
    font-size: 15px;
    pointer-events: none;
    z-index: 9999;
    animation: fadeCorazon 3.5s linear forwards;
}

@keyframes fadeCorazon {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
}


/* ANIMACIONES */
.animated-song{
  animation: marquee 8s linear infinite;
}

@keyframes marquee{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

</style>
</head>
<body>

<video class="bg-video" autoplay muted loop>
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div class="overlay-red"></div>

<div class="intro" id="intro">
  <button class="intro-btn" onclick="enterSite()">ENTRAR</button>
</div>

<div class="wrapper">
  <div class="menu-left">
    <button onclick="togglePlayer()"><i>🎵</i>Music</button>
    <button onclick="abrirFriend()"><i>👥</i>Friends</button>
    <button onclick="abrirMarried()"><i>💍</i>Love</button>
    <button onclick="abrirGaleria()"><i>📸</i>Gallery</button>
  </div>

  <div class="card">
    
    <div class="player-drop" id="playerDrop">
      <div class="player-glass">
        <div class="music-title">Musica</div>
        <div class="song-name animated-song" id="songName">Cargando...</div>
        <div class="player-controls">
          <button id="prevBtn">⏮</button>
          <button id="playPauseBtn">▶</button>
          <button id="nextBtn">⏭</button>
        </div>
        <input type="range" id="progress" class="progress" value="0">
      </div>
    </div>

    <div class="avatar-container">
      <img src="https://i.postimg.cc/q7SjJ3Rz/9f7a5b6c-e1a1-4d3e-9f0a-6f7a5b6c1a1a.jpg" class="avatar" alt="Avatar">
      <div class="status-badge"></div>
    </div>

    <div class="info">
      <h1>Namee</h1>
      <p>“Sombras del pasado, luces del alma.”</p>
    </div>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-value">666</span>
        <span class="stat-label">Power</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">99</span>
        <span class="stat-label">Level</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">∞</span>
        <span class="stat-label">Dark</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="window.open('https://xat.com/XatSpace','_blank')">Añadir</button>
      <button class="btn btn-secondary">Mensaje</button>
    </div>

    <div class="social-links">
      <a href="#">Fb</a>
      <a href="#">Ig</a>
      <a href="#">Tw</a>
    </div>
  </div>
</div>

<div class="modal" id="galeriaModal">
  <span class="close-modal" onclick="cerrarGaleria()">&times;</span>
  <div class="modal-content">
    <div class="slider-container">
       <div class="slide active" style="background-image:url('https://i.postimg.cc/q7SjJ3Rz/9f7a5b6c-e1a1-4d3e-9f0a-6f7a5b6c1a1a.jpg')"></div>
       <div class="slide right" style="background-image:url('https://i.postimg.cc/q7SjJ3Rz/9f7a5b6c-e1a1-4d3e-9f0a-6f7a5b6c1a1a.jpg')"></div>
       <div class="slide left" style="background-image:url('https://i.postimg.cc/q7SjJ3Rz/9f7a5b6c-e1a1-4d3e-9f0a-6f7a5b6c1a1a.jpg')"></div>
    </div>
    <div class="nav-slider">
      <button onclick="prevSlide()">Anterior</button>
      <button onclick="nextSlide()">Siguiente</button>
    </div>
  </div>
</div>

<div class="modal" id="friendModal">
  <span class="close-modal" onclick="cerrarFriend()">&times;</span>
  <div class="modal-content">
    <div class="friend-grid">
      <div class="friend-card">
        <img src="https://i.postimg.cc/q7SjJ3Rz/9f7a5b6c-e1a1-4d3e-9f0a-6f7a5b6c1a1a.jpg">
        <h3>User 1</h3>
        <p>Best Friend</p>
      </div>
      <div class="friend-card">
        <img src="https://i.postimg.cc/q7SjJ3Rz/9f7a5b6c-e1a1-4d3e-9f0a-6f7a5b6c1a1a.jpg">
        <h3>User 2</h3>
        <p>Partner</p>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="marriedModal">
  <span class="close-modal" onclick="cerrarMarried()">&times;</span>
  <div class="modal-content married-content">
    <img src="https://i.postimg.cc/q7SjJ3Rz/9f7a5b6c-e1a1-4d3e-9f0a-6f7a5b6c1a1a.jpg">
    <h2>Amor Eterno</h2>
    <p>"Encontrarte fue el inicio de todo."</p>
    <p style="color:#6b0000; font-size:24px; margin-top:15px;">❤️</p>
  </div>
</div>

<script>
// PLAYLIST ATUALIZADA
let songs = [
  { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
  { name: "The Sound of Silence – Rising to the Night", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" },
  { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=0yenl8sh&raw=1" }
];

let audio = new Audio();
let currentIndex = 0;
let isPlaying = false;

const playPauseBtn = document.getElementById("playPauseBtn");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const songName = document.getElementById("songName");
const progress = document.getElementById("progress");

function loadSong(index){
  audio.src = songs[index].url;
  songName.textContent = songs[index].name;
}

playPauseBtn.onclick = () => {
  if(audio.paused){
    audio.play();
    playPauseBtn.textContent = "⏸";
  } else {
    audio.pause();
    playPauseBtn.textContent = "▶";
  }
};

nextBtn.onclick = () => {
  currentIndex = (currentIndex + 1) % songs.length;
  loadSong(currentIndex);
  audio.play();
  playPauseBtn.textContent = "⏸";
};

prevBtn.onclick = () => {
  currentIndex = (currentIndex - 1 + songs.length) % songs.length;
  loadSong(currentIndex);
  audio.play();
  playPauseBtn.textContent = "⏸";
};

loadSong(currentIndex);

function togglePlayer(){
  document.getElementById("playerDrop").classList.toggle("active");
}

function enterSite(){
  const intro = document.getElementById("intro");
  intro.style.opacity = "0";
  setTimeout(() => {
    intro.style.display = "none";
    // Tocar música ao clicar em entrar
    audio.play();
    playPauseBtn.textContent = "⏸";
  }, 1000);
}

/* Bloquear acciones */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());


function spawnSparkle(e){
  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  
  const x = e.clientX || (e.data && e.data.x);
  const y = e.clientY || (e.data && e.data.y);
  
  if(!x || !y) return;

  sparkle.style.left = x + "px";
  sparkle.style.top = y + "px";
  
  const destX = (Math.random() - 0.5) * 100;
  const destY = (Math.random() - 0.5) * 100;
  
  sparkle.style.setProperty('--x', destX + "px");
  sparkle.style.setProperty('--y', destY + "px");
  
  document.body.appendChild(sparkle);
  setTimeout(()=> sparkle.remove(), 1500);
}

document.addEventListener('mousemove', spawnSparkle);
window.addEventListener("message", spawnSparkle);


document.addEventListener("mousemove", function(e) {
    let corazon = document.createElement("div");
    corazon.className = "corazon-xat";
    corazon.innerHTML = "❤";
    corazon.style.left = (e.clientX + 5) + "px";
    corazon.style.top = (e.clientY + 5) + "px";

    document.body.appendChild(corazon);

    setTimeout(() => {
        corazon.remove();
    }, 3500);
});


function abrirFriend(){
  document.getElementById("friendModal").classList.add("active");
}

function cerrarFriend(){
  document.getElementById("friendModal").classList.remove("active");
}

function abrirMarried(){
  document.getElementById("marriedModal").classList.add("active");
}

function cerrarMarried(){
  document.getElementById("marriedModal").classList.remove("active");
}

const slides = document.querySelectorAll('#galeriaModal .slide');
let current = 0;

function update(){
  slides.forEach((s,i)=>{
    s.className = 'slide';
    if(i === current) s.classList.add('active');
    else if(i === (current - 1 + slides.length) % slides.length) s.classList.add('left');
    else if(i === (current + 1) % slides.length) s.classList.add('right');
  });
}

function nextSlide(){
  current = (current + 1) % slides.length;
  update();
}

function prevSlide(){
  current = (current - 1 + slides.length) % slides.length;
  update();
}

function abrirGaleria(){
  document.getElementById("galeriaModal").classList.add("active");
}

function cerrarGaleria(){
  document.getElementById("galeriaModal").classList.remove("active");
}
</script>

</body>
</html>
