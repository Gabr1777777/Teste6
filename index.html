<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>XatSpace – Namee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
/* Estilo do Alerta Personalizado */
#custom-alert {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.85);
  color: #fff;
  padding: 20px 40px;
  border-radius: 10px;
  font-family: 'Poppins', sans-serif;
  font-size: 18px;
  z-index: 1000000;
  display: none;
  border: 1px solid #ff0000;
  box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
  text-align: center;
}

/* Bloqueio de seleção de texto */
body {
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#6b0000,#7a0000,#910000);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* O restante dos seus estilos originais permanece igual... */
.wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.menu-left{
  position:absolute;
  left:-100px;
  top:36%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:10;
}

.menu-left a{
  position:relative;
  width:110px;
  padding:10px 0;
  text-align:center;
  background:rgba(238, 29, 43, 0.712);
  backdrop-filter:blur(14px);
  border-radius:10px;
  border:1px solid rgba(241, 49, 49, 0.35);
  font-size:13px;
  color:#fcdcdf;
  text-decoration:none;
  box-shadow: inset 0 0 1px rgba(250, 58, 58, 0.6), 0 4px 10px rgba(128, 40, 40, 0.25);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

.menu-left a::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgb(248, 118, 118), rgb(248, 122, 122), rgb(253, 112, 112));
  opacity:0;
  transition:opacity .15s ease;
}

.menu-left a:hover{
  transform:translateX(-10px);
  box-shadow:0 2px 2px rgba(248, 114, 114, 0.795);
}

.card{
  position:relative;
  width:420px;
  height:560px;
  border-radius:30px;
  background:rgba(216, 29, 29, 0.959);
  backdrop-filter:blur(20px);
  box-shadow:0 15px 10px rgba(141, 15, 15, 0.637);
  z-index:2;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:22px;
  border:1.5px solid rgba(255,255,255,.75);
  pointer-events:none;
}

.avatar-wrap{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:160px;
  height:160px;
}

.avatar{
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  border:4px solid rgba(255,255,255,.8);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  position:absolute;
  top:230px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Playfair Display',serif;
  font-size:28px;
  color:#ffe8e8;
}

.subtitle{
  position:absolute;
  top:280px;
  left:50%;
  transform:translateX(-50%);
  font-size:13px;
  color:#fdeaea;
}

.bio{
  position:absolute;
  top:315px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  white-space: pre-wrap;
  padding:14px 16px;
  font-size:11px;
  line-height:1.6;
  color:#fcf3f4;
  text-align:center;
  background:rgba(224, 102, 102, 0.596);
  backdrop-filter:blur(10px);
  border-radius:16px;
  box-shadow:0 2px 4px rgba(68, 30, 30, 0.12);
}

.bio::after {
  content: '|';
  animation: blink 0.7s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.firma{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
}

.firma img{
  max-width:280px;
}

.footer{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:8px;
  color:#fdeef0aa;
}

.modal-overlay{
  position:fixed;
  inset:0;
  background: rgba(255, 180, 210, 0.08);
  backdrop-filter: blur(7px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:999;
}

.modal-overlay.active{
  opacity:1;
  pointer-events:auto;
}

.modal-content{
  position:relative;
  width:90%;
  max-width:650px;
  height:530px;
  border-radius:20px;
  overflow:visible;
  box-shadow:0 0 40px rgba(235, 53, 53, 0.466);
  animation:zoomIn .35s ease;
}

.modal-content::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:25px;
  border:3px solid rgba(255, 255, 255, 0.9);
  pointer-events:none;
  box-shadow: 0 0 25px rgba(204, 44, 44, 0.9), 0 0 60px rgba(170, 31, 38, 0.5);
}

.modal-content iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:20px;
  overflow:hidden;
}

.modal-close{
  position:absolute;
  top:7px;
  right:10px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(8px);
  color:#f33242;
  font-size:22px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:1000;
  box-shadow:0 6px 18px rgba(120,40,90,.45);
  transition:.25s ease;
}

@keyframes zoomIn{
  from{transform:scale(.85); opacity:0}
  to{transform:scale(1); opacity:1}
}

#heartsCanvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

.player-slide{
  position:absolute;
  top:670px;
  right:0;
  transform: translateX(260px);
  width:200px;
  height:100px;
  display:flex;
  align-items:center;
  transition: transform .6s cubic-bezier(.4,0,.2,1);
  z-index:10060;
}

.player-slide.active{
  transform: translateX(0);
}

.player-tab{
  width:40px;
  height:120px;
  background: linear-gradient(180deg,#ff3b3b,#ca36367a);
  border-radius:15px 0 0 15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 0 25px rgba(255,0,0,.6);
}

.player-glass{
  width:200px;
  height:auto;
  padding:15px;
  background: rgba(223, 129, 129, 0.575);
  backdrop-filter: blur(18px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.25);
  margin-left:-1px;
  box-shadow: inset 0 0 20px rgba(255,255,255,.15), 0 0 40px rgba(194, 88, 88, 0.45);
}

.music-title{
  font-size:11px;
  letter-spacing:2px;
  color:#ffd6d6;
  text-transform:uppercase;
  margin-bottom:6px;
  text-align:center;
}

.animated-song{
  font-size:12px;
  margin-bottom:14px;
  background: linear-gradient(90deg,#fff,#fce3e3,#fff);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: songGlow 4s linear infinite;
}

@keyframes songGlow{
  to{ background-position:200% center; }
}

.player-controls{
  display:flex;
  justify-content:center;
  gap:16px;
}

.player-controls button{
  width:40px;
  height:40px;
  border-radius:50%;
  background: rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  cursor:pointer;
  backdrop-filter: blur(12px);
  transition:.3s;
}

.progress, .volume-slider{
  margin-top:14px;
  width:100%;
  accent-color:#eed7d7;
}

.volume-container {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 5px;
}

.btn-player{
  position:relative;
}

.player-drop{
  position:fixed;
  left:calc(140% - 210px);
  top:42%;
  margin-top:120px;
  width:260px;
  transform: translateY(-15px);
  opacity:0;
  pointer-events:none;
  transition:.4s ease;
  z-index:1000;
}

.player-drop.active{
  transform: translateY(0);
  opacity:1;
  pointer-events:auto;
}

.menu-left .btn-player{
  width:110px;
  display:block;
}

.menu-left .btn-player > a{
  width:100%;
  display:block;
}

img{
  pointer-events:none;
  user-select:none;
}

.home-icon{
  position:absolute;
  width:35px;
  height:35px;
  right:0;
  bottom:5px;
  z-index:15;
  cursor:pointer;
  transition:.25s ease;
  display:flex;
  align-items:center;
  justify-content:center;
}

.home-icon img{
  width:100%;
  height:100%;
  object-fit: contain;
}

.intro{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient( circle at top, #5a0000, #500000, #530000 );
  overflow:hidden;
}

.heart-wrapper{
  transform: translateY(-10px);
}

.heart-enter{
  position:relative;
  width:130px;
  height:130px;
  cursor:pointer;
  transform:rotate(-45deg);
  animation:heartFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 25px rgba(216, 23, 23, 0.8)) drop-shadow(0 0 60px rgba(192, 18, 18, 0.6));
  transition:.35s ease;
}

.heart-enter::before, .heart-enter::after{
  content:"";
  position:absolute;
  width:130px;
  height:130px;
  border-radius:50%;
  z-index:1;
  background:linear-gradient( 145deg, #fa8888, #cc1919, #ce1616 );
}

.heart-enter::before{ top:-65px; left:0; }
.heart-enter::after{ left:65px; top:0; }

.heart-glass{
  position:absolute;
  inset:0;
  border-radius:18px;
  z-index:2;
  background:linear-gradient( 145deg, rgba(255,255,255,.35), rgba(255,180,190,.85) );
  backdrop-filter:blur(14px);
  box-shadow: inset 0 0 28px rgba(255,255,255,.45), 0 0 45px rgba(255, 100, 100, 0.75);
}

.heart-text{
  position:absolute;
  inset:0;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transform:rotate(45deg);
  font-family:'Playfair Display',serif;
  font-size:17px;
  letter-spacing:4px;
  line-height:1;
  color:#db2828;
  text-shadow: 0 2px 3px rgba(255,255,255,.95), 0 0 12px rgba(247, 88, 88, 0.9);
  pointer-events:none;
}

.mini-heart{
  position:absolute;
  width:14px;
  height:14px;
  z-index:3;
  background:linear-gradient(145deg,#ffd6dc,#fa6e6e);
  transform:rotate(-45deg);
  opacity:.75;
  animation:floatMini 3s ease-in-out infinite;
}

.mini-heart::before, .mini-heart::after{
  content:"";
  position:absolute;
  width:14px;
  height:14px;
  background:inherit;
  border-radius:50%;
}

.mini-heart::before{ top:-7px; left:0; }
.mini-heart::after{ left:7px; top:0; }

.mh1{ left:-26px; top:22px; animation-delay:.2s; }
.mh2{ right:-26px; top:38px; animation-delay:.4s; }
.mh3{ left:18px; bottom:-28px; animation-delay:.6s; }
.mh4{ right:20px; bottom:-32px; animation-delay:.8s; }

@keyframes heartFloat{
  0%,100%{ transform:rotate(-45deg) translateY(0); }
  50%{ transform:rotate(-45deg) translateY(-10px); }
}

@keyframes floatMini{
  0%,100%{ transform:rotate(-45deg) translateY(0); opacity:.6; }
  50%{ transform:rotate(-45deg) translateY(-8px); opacity:1; }
}

#page-transition{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, rgba(248, 137, 137, 0.85), rgba(196, 20, 20, 0.95) );
  opacity:0;
  pointer-events:none;
  z-index:9999;
  transform:scale(1.2);
  filter:blur(20px);
  transition: opacity .9s ease, transform .9s ease, filter .9s ease;
}

body.is-transitioning #page-transition{
  opacity:1;
  transform:scale(1);
  filter:blur(0);
}

.page-content{
  min-height:100vh;
  width:100%;
  display:flex;
  justify-content:center;
  opacity:0;
  transform:translateY(20px);
  transition: opacity 1.4s ease, transform 1.4s ease;
}

body.entered .page-content{
  opacity:1;
  transform:translateY(0);
}

body.entered{
  overflow:auto;
}

.heart-sparkle{
  position: fixed;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, #ec3434, transparent);
  border-radius: 50%;
  pointer-events:none;
  z-index: 99998;
  animation: sparkleFade .6s ease-out forwards;
}

@keyframes sparkleFade{
  from{ opacity:1; transform: scale(1); }
  to{ opacity:0; transform: scale(2.5); }
}

html, body{
  pointer-events: auto !important;
}

.corazon-xat {
  position: fixed;
  font-size: 16px;
  color: #f87070;
  animation: corazonFlotar 3.5s ease-out forwards;
  pointer-events: none;
  z-index: 999999;
  text-shadow: 0 0 6px rgba(219, 87, 87, 0.6);
}

@keyframes corazonFlotar {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-120px) scale(1.4); opacity: 0; }
}

/* Os demais estilos do modal e elementos permanecem... */
</style>
</head>
<body>

<div id="custom-alert">Copyright - Acesso proibido</div>

<div class="intro" id="intro">
  <div class="heart-wrapper">
    <div class="heart-enter" onclick="enterSite()">
      <div class="heart-glass"></div>
      <span class="heart-text">Entrar</span>
      <i class="mini-heart mh1"></i>
      <i class="mini-heart mh2"></i>
      <i class="mini-heart mh3"></i>
      <i class="mini-heart mh4"></i>
    </div>
  </div>
</div>

<div id="page-transition"></div>

<div class="page-content">
  <canvas id="heartsCanvas"></canvas>
  <div class="wrapper">
    <div class="menu-left">
      <a href="#" onclick="abrirMarried(); return false;">♡ Married ♡</a>
      <a href="#" onclick="abrirAmigos(); return false;">♡ Amigos ♡</a>
      <a href="#" onclick="abrirGaleria(); return false;">♡ Galeria ♡</a>
      <div class="btn-player">
        <a href="#" onclick="togglePlayer(); return false;">♡ Musica ♡</a>
        <div class="player-drop" id="playerDrop">
          <div class="player-glass">
            <div class="music-title">Musica</div>
            <div class="song-name animated-song" id="songName">Cargando...</div>
            <div class="player-controls">
              <button id="prevBtn">⏮</button>
              <button id="playPauseBtn">▶</button>
              <button id="nextBtn">⏭</button>
            </div>
            <input type="range" id="progress" class="progress" value="0">
            <div class="volume-container">
              <span class="volume-icon">🔊</span>
              <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="avatar-wrap">
        <div class="avatar">
          <img src="https://xatimg.com/image/3jmO98mi8QCG.jpg">
        </div>
        <a href="https://xat.com" target="_blank" class="home-icon" title="Brasil">
          <img src="https://xatimg.com/image/fIeImPfcKjZq.png" alt="Home">
        </a>
      </div>
      <div class="name">♥ Name ♥</div>
      <div class="subtitle">Bem vindos ao meu Xatspace</div>
      <div class="bio" id="typingText"></div>
      <div class="footer">✦ By:Gabr ✦</div>
    </div>
  </div>
</div>

<script>
// Função para mostrar o alerta personalizado
function showAlert() {
  const alertBox = document.getElementById('custom-alert');
  alertBox.style.display = 'block';
  setTimeout(() => {
    alertBox.style.display = 'none';
  }, 2000);
}

// Bloqueio do Botão Direito
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  showAlert();
});

// Bloqueio Ctrl+U e F12
document.onkeydown = function(e) {
  if (e.ctrlKey && (e.keyCode === 85) || (e.keyCode === 123)) {
    showAlert();
    return false;
  }
};

// Bloqueio de Seleção (extra via JS)
document.onselectstart = function(e) {
  e.preventDefault();
  showAlert();
};

// Funções originais do seu site permanecem abaixo...
const textToType = "Quando tiver finalizado uma meta, não olhe para ela como a linha de chegada; olhe como o punto de partida para sua próxima conquista.";
let index = 0;
function typeWriter() {
  if (index < textToType.length) {
    document.getElementById("typingText").innerHTML += textToType.charAt(index);
    index++;
    setTimeout(typeWriter, 50);
  }
}

function enterSite() {
  document.getElementById("intro").style.display = "none";
  document.body.classList.add("entered");
  typeWriter();
}

// O restante do seu código (Canvas, Modais, Player) continua aqui sem alterações...
</script>
</body>
</html>
