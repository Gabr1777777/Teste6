<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>XatSpace – Namee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#6b0000,#7a0000,#910000);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* CONTENEDOR PRINCIPAL */
.wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

/* BOTONES PEGADOS A LA CARD */
.menu-left{
  position:absolute;
  left:-100px;
  top:36%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:10;
}

.menu-left a{
  position:relative;
  width:110px;
  padding:10px 0;
  text-align:center;
  background:rgba(238, 29, 43, 0.712);
  backdrop-filter:blur(14px);
  border-radius:10px;
  border:1px solid rgba(241, 49, 49, 0.35);
  font-size:13px;
  color:#fcdcdf;
  text-decoration:none;
  box-shadow: inset 0 0 1px rgba(250, 58, 58, 0.6), 0 4px 10px rgba(128, 40, 40, 0.25);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

.menu-left a:hover{
  transform:translateX(-10px);
  box-shadow:0 2px 2px rgba(248, 114, 114, 0.795);
}

/* TARJETA */
.card{
  position:relative;
  width:420px;
  height:560px;
  border-radius:30px;
  background:rgba(216, 29, 29, 0.959);
  backdrop-filter:blur(20px);
  box-shadow:0 15px 10px rgba(141, 15, 15, 0.637);
  z-index:2;
  overflow:hidden;
}

.avatar-wrap{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  width:160px;
  height:160px;
}

.avatar{
  position:relative;
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  border:4px solid rgba(255,255,255,.8);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  position:absolute;
  top:230px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Playfair Display',serif;
  font-size:28px;
  color:#ffe8e8;
}

.subtitle{
  position:absolute;
  top:280px;
  left:50%;
  transform:translateX(-50%);
  font-size:13px;
  color:#fdeaea;
}

.bio{
  position:absolute;
  top:315px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  white-space: pre-wrap;
  padding:14px 16px;
  font-size:11px;
  line-height:1.6;
  color:#fcf3f4;
  text-align:center;
  background:rgba(224, 102, 102, 0.596);
  backdrop-filter:blur(10px);
  border-radius:16px;
}

.footer{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:8px;
  color:#fdeef0aa;
}

/* PLAYER DROPDOWN */
.player-drop{
  position:fixed;
  left:calc(140% - 210px);
  top:42%;
  margin-top:120px;
  width:260px;
  transform: translateY(-15px);
  opacity:0;
  pointer-events:none;
  transition:.4s ease;
  z-index:1000;
}

.player-drop.active{
  transform: translateY(0);
  opacity:1;
  pointer-events:auto;
}

.player-glass{
  padding:15px;
  background: rgba(223, 129, 129, 0.575);
  backdrop-filter: blur(18px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.25);
}

.music-title{ font-size:11px; color:#ffd6d6; text-align:center; margin-bottom:6px; }
.animated-song{ font-size:12px; color:#fff; text-align:center; margin-bottom:14px; }

/* CANVAS CORAZONES */
#heartsCanvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* INTRO */
.intro{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at top, #5a0000, #500000);
}

.heart-enter{
  width:130px;
  height:130px;
  background:#ce1616;
  transform:rotate(-45deg);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.heart-enter::before, .heart-enter::after{
  content:"";
  position:absolute;
  width:130px;
  height:130px;
  background:inherit;
  border-radius:50%;
}
.heart-enter::before{ top:-65px; left:0; }
.heart-enter::after{ left:65px; top:0; }

.heart-text{
  transform:rotate(45deg);
  z-index:10;
  color:#fff;
  font-family:'Playfair Display',serif;
}

.modal-overlay{
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.modal-overlay.active{ display:flex; }
.modal-content{ background:#910000; padding:20px; border-radius:20px; position:relative; }
.modal-close{ position:absolute; top:10px; right:10px; cursor:pointer; color:#fff; }

</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="heart-enter" onclick="enterSite()">
    <span class="heart-text">Entrar</span>
  </div>
</div>

<canvas id="heartsCanvas"></canvas>

<div class="page-content">
  <div class="wrapper">
    <div class="menu-left">
      <a href="#" onclick="abrirModal('marriedModal')">♡ Married ♡</a>
      <a href="#" onclick="abrirModal('friendModal')">♡ Amigos ♡</a>
      <a href="#" onclick="togglePlayer()">♡ Musica ♡</a>
      <div class="player-drop" id="playerDrop">
        <div class="player-glass">
          <div class="music-title">Reproduzindo</div>
          <div class="animated-song" id="songName">Cargando...</div>
          <div style="display:flex; justify-content:center; gap:10px;">
            <button onclick="prevSong()">⏮</button>
            <button id="playBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="avatar-wrap">
        <div class="avatar"><img src="https://xatimg.com/image/3jmO98mi8QCG.jpg"></div>
      </div>
      <div class="name">♥ Name ♥</div>
      <div class="subtitle">Bem vindos ao meu Xatspace</div>
      <div class="bio">Sua frase aqui...</div>
      <div class="footer">✦ By:Gabr ✦</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="marriedModal">
  <div class="modal-content">
    <span class="modal-close" onclick="cerrarModal('marriedModal')">×</span>
    <h2 style="color:#fff">Married Info</h2>
  </div>
</div>

<div class="modal-overlay" id="friendModal">
  <div class="modal-content">
    <span class="modal-close" onclick="cerrarModal('friendModal')">×</span>
    <h2 style="color:#fff">Amigos</h2>
  </div>
</div>

<script>
// --- CONFIGURAÇÃO DE MÚSICA ---
const playlist = [
  { name: "Musica 1", url: "https://www.dropbox.com/scl/fi/xxxx/track1.mp3?rlkey=xxxx&dl=1" },
  { name: "Musica 2", url: "https://www.dropbox.com/scl/fi/xxxx/track2.mp3?rlkey=xxxx&dl=1" }
];
let currentTrack = 0;
const audio = new Audio();

function loadTrack(index) {
  const track = playlist[index];
  audio.src = track.url;
  document.getElementById('songName').innerText = track.name;
}

// TOCAR PRÓXIMA AUTOMATICAMENTE 
audio.onended = function() {
  nextSong();
};

function togglePlay() {
  if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
  else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
}

function nextSong() {
  currentTrack = (currentTrack + 1) % playlist.length;
  loadTrack(currentTrack);
  audio.play();
}

function prevSong() {
  currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
  loadTrack(currentTrack);
  audio.play();
}

function togglePlayer() {
  document.getElementById('playerDrop').classList.toggle('active');
}

// --- EFEITO DE CORAÇÕES CAINDO --- [cite: 191, 192]
const canvas = document.getElementById('heartsCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const hearts = [];
function createHeart() {
  return {
    x: Math.random() * canvas.width,
    y: -20,
    size: Math.random() * 10 + 5,
    speed: Math.random() * 2 + 1,
    opacity: Math.random() * 0.5 + 0.3
  };
}

function drawHearts() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#f87070';
  hearts.forEach((h, i) => {
    h.y += h.speed;
    ctx.globalAlpha = h.opacity;
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.size, 0, Math.PI * 2);
    ctx.fill();
    if (h.y > canvas.height) hearts[i] = createHeart();
  });
  requestAnimationFrame(drawHearts);
}

for(let i=0; i<30; i++) hearts.push(createHeart());
drawHearts();

// --- FUNÇÕES GERAIS ---
function enterSite() {
  document.getElementById('intro').style.display = 'none';
  loadTrack(0);
}

function abrirModal(id) { document.getElementById(id).classList.add('active'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }

window.onresize = () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
};
</script>

</body>
</html>
