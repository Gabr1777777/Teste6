<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>XatSpace – Namee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#6b0000,#7a0000,#910000);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.menu-left{
  position:absolute;
  left:-100px;
  top:36%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:10;
}

.menu-left a{
  position:relative;
  width:110px;
  padding:10px 0;
  text-align:center;
  background:rgba(238, 29, 43, 0.712);
  backdrop-filter:blur(14px);
  border-radius:10px;
  border:1px solid rgba(241, 49, 49, 0.35);
  font-size:13px;
  color:#fcdcdf;
  text-decoration:none;
  box-shadow: inset 0 0 1px rgba(250, 58, 58, 0.6), 0 4px 10px rgba(128, 40, 40, 0.25);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

.menu-left a::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgb(248, 118, 118), rgb(248, 122, 122), rgb(253, 112, 112));
  opacity:0;
  transition:opacity .15s ease;
}

.menu-left a:hover{
  transform:translateX(-10px);
  box-shadow:0 2px 2px rgba(248, 114, 114, 0.795);
}

.card{
  position:relative;
  width:420px;
  height:560px;
  border-radius:30px;
  background:rgba(216, 29, 29, 0.959);
  backdrop-filter:blur(20px);
  box-shadow:0 15px 10px rgba(141, 15, 15, 0.637);
  z-index:2;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:22px;
  border:1.5px solid rgba(255,255,255,.75);
  pointer-events:none;
}

.avatar-wrap{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:160px;
  height:160px;
}

.avatar{
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  border:4px solid rgba(255,255,255,.8);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  position:absolute;
  top:230px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Playfair Display',serif;
  font-size:28px;
  color:#ffe8e8;
}

.subtitle{
  position:absolute;
  top:280px;
  left:50%;
  transform:translateX(-50%);
  font-size:13px;
  color:#fdeaea;
}

.bio{
  position:absolute;
  top:315px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  white-space: pre-wrap;
  padding:14px 16px;
  font-size:11px;
  line-height:1.6;
  color:#fcf3f4;
  text-align:center;
  background:rgba(224, 102, 102, 0.596);
  backdrop-filter:blur(10px);
  border-radius:16px;
  box-shadow:0 2px 4px rgba(68, 30, 30, 0.12);
}

.bio::after {
  content: '|';
  animation: blink 0.7s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.footer{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:8px;
  color:#fdeef0aa;
}

.modal-overlay{
  position:fixed;
  inset:0;
  background: rgba(255, 180, 210, 0.08);
  backdrop-filter: blur(7px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:999;
}

.modal-overlay.active{
  opacity:1;
  pointer-events:auto;
}

.modal-content{
  position:relative;
  width:90%;
  max-width:650px;
  height:530px;
  border-radius:20px;
  overflow:visible;
  box-shadow:0 0 40px rgba(235, 53, 53, 0.466);
  animation:zoomIn .35s ease;
}

.modal-content::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:25px;
  border:3px solid rgba(255, 255, 255, 0.9);
  pointer-events:none;
  box-shadow: 0 0 25px rgba(204, 44, 44, 0.9), 0 0 60px rgba(170, 31, 38, 0.5);
}

.modal-close{
  position:absolute;
  top:7px;
  right:10px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(8px);
  color:#f33242;
  font-size:22px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:1000;
  box-shadow:0 6px 18px rgba(120,40,90,.45);
  transition:.25s ease;
}

.player-drop{
  position:fixed;
  left:calc(140% - 210px);
  top:42%;
  margin-top:120px;
  width:260px;
  transform: translateY(-15px);
  opacity:0;
  pointer-events:none;
  transition:.4s ease;
  z-index:1000;
}

.player-drop.active{
  transform: translateY(0);
  opacity:1;
  pointer-events:auto;
}

.player-glass{
  width:200px;
  padding:15px;
  background: rgba(223, 129, 129, 0.575);
  backdrop-filter: blur(18px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.25);
  box-shadow: inset 0 0 20px rgba(255,255,255,.15), 0 0 40px rgba(194, 88, 88, 0.45);
}

.music-title{
  font-size:11px;
  letter-spacing:2px;
  color:#ffd6d6;
  text-transform:uppercase;
  margin-bottom:6px;
  text-align:center;
}

.animated-song{
  font-size:12px;
  margin-bottom:14px;
  background: linear-gradient(90deg,#fff,#fce3e3,#fff);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: songGlow 4s linear infinite;
  text-align: center;
}

.player-controls{
  display:flex;
  justify-content:center;
  gap:16px;
}

.player-controls button{
  width:40px;
  height:40px;
  border-radius:50%;
  background: rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  cursor:pointer;
  color: white;
}

.progress, .volume-slider{
  margin-top:14px;
  width:100%;
  accent-color:#eed7d7;
}

.home-icon{
  position:absolute;
  width:35px;
  height:35px;
  right:0;
  bottom:5px;
  z-index:15;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.home-icon img{
  width:100%;
  height:100%;
  object-fit: contain;
}

.intro{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at top,#5a0000,#500000,#530000);
}

.heart-enter{
  position:relative;
  width:130px;
  height:130px;
  cursor:pointer;
  transform:rotate(-45deg);
  animation:heartFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 25px rgba(216, 23, 23, 0.8));
}

.heart-enter::before, .heart-enter::after{
  content:"";
  position:absolute;
  width:130px;
  height:130px;
  border-radius:50%;
  background:linear-gradient(145deg, #fa8888, #cc1919, #ce1616);
}

.heart-enter::before{ top:-65px; left:0; }
.heart-enter::after{ left:65px; top:0; }

.heart-glass{
  position:absolute;
  inset:0;
  border-radius:18px;
  z-index:2;
  background:linear-gradient(145deg, rgba(255,255,255,.35), rgba(255,180,190,.85));
  backdrop-filter:blur(14px);
}

.heart-text{
  position:absolute;
  inset:0;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:rotate(45deg);
  font-family:'Playfair Display',serif;
  font-size:17px;
  color:#db2828;
  pointer-events:none;
}

@keyframes heartFloat{
  0%,100%{ transform:rotate(-45deg) translateY(0); }
  50%{ transform:rotate(-45deg) translateY(-10px); }
}

.page-content{
  opacity:0;
  transform:translateY(20px);
  transition: opacity 1.4s ease, transform 1.4s ease;
}

body.entered .page-content{
  opacity:1;
  transform:translateY(0);
}

.heart-sparkle{
  position: fixed;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, #ec3434, transparent);
  border-radius: 50%;
  pointer-events:none;
  z-index: 99998;
  animation: sparkleFade .6s ease-out forwards;
}

@keyframes sparkleFade{
  from{ opacity:1; transform: scale(1); }
  to{ opacity:0; transform: scale(2.5); }
}

.corazon-xat {
    position: fixed;
    font-size: 16px;
    color: #f87070;
    animation: corazonFlotar 3.5s ease-out forwards;
    pointer-events: none;
    z-index: 999999;
}

@keyframes corazonFlotar {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-120px) scale(1.4); opacity: 0; }
}

/* Cursor e Travas */
html, body, * {
    cursor: none !important;
    user-select: none !important;
}

/* Modais Específicos */
.married-card, .Amigos-card, .gallery-box {
    background: rgba(182, 12, 12, 0.95);
    border-radius: 26px;
    padding: 20px;
    color: white;
    text-align: center;
    margin: auto;
}

.slider{
  position:relative;
  width:100%;
  height:420px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:220px;
  height:360px;
  transition:.6s ease;
  opacity: 0;
}

.slide.active { opacity: 1; transform: scale(1); z-index: 3; }
.slide.left { opacity: 0.6; transform: translateX(-260px) scale(0.8); }
.slide.right { opacity: 0.6; transform: translateX(260px) scale(0.8); }

.nav{
  position:absolute;
  top:50%;
  cursor:pointer;
  font-size:30px;
  z-index:5;
}
.nav.prev{left:18px}
.nav.next{right:18px}

#heartsCanvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}
</style>
</head>
<body>

<div class="intro" id="intro">
    <div class="heart-enter" onclick="enterSite()">
      <div class="heart-glass"></div>
      <span class="heart-text">Entrar</span>
    </div>
</div>

<div class="page-content">
  <canvas id="heartsCanvas"></canvas>
  <div class="wrapper">
    <div class="menu-left">
      <a href="#" onclick="abrirMarried(); return false;">♡ Married ♡</a>
      <a href="#" onclick="abrirAmigos(); return false;">♡ Amigos ♡</a>
      <a href="#" onclick="abrirGaleria(); return false;">♡ Galeria ♡</a>
      <div class="btn-player">
        <a href="#" onclick="togglePlayer(); return false;">♡ Musica ♡</a>
        <div class="player-drop" id="playerDrop">
          <div class="player-glass">
            <div class="music-title">Musica</div>
            <div class="song-name animated-song" id="songName">Cargando...</div>
            <div class="player-controls">
              <button id="prevBtn">⏮</button>
              <button id="playPauseBtn">▶</button>
              <button id="nextBtn">⏭</button>
            </div>
            <input type="range" id="progress" class="progress" value="0">
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="avatar-wrap">
        <div class="avatar"><img src="https://xatimg.com/image/3jmO98mi8QCG.jpg"></div>
        <a href="https://xat.com" target="_blank" class="home-icon"><img src="https://xatimg.com/image/fIeImPfcKjZq.png"></a>
      </div>
      <div class="name">♥ Name ♥</div>
      <div class="subtitle">Bem vindos ao meu Xatspace</div>
      <div class="bio" id="typingText"></div>
      <div class="footer">✦ By:Gabr ✦</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="galeriaModal">
  <div class="modal-content">
    <span class="modal-close" onclick="cerrarGaleria()">×</span>
    <div class="gallery-box">
      <div class="slider" id="slider">
        <div class="slide active"><img src="https://xatimg.com/image/7BIxmBkfxdGu.jpg" width="100%"></div>
        <div class="slide right"><img src="https://xatimg.com/image/7BIxmBkfxdGu.jpg" width="100%"></div>
        <div class="slide left"><img src="https://xatimg.com/image/7BIxmBkfxdGu.jpg" width="100%"></div>
      </div>
      <div class="nav prev" onclick="prev()">❮</div>
      <div class="nav next" onclick="next()">❯</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="friendModal">
  <div class="modal-content">
    <span class="modal-close" onclick="cerrarFriend()">×</span>
    <div class="Amigos-card">
      <div class="Amigos-title">♡ Amigos ♡</div>
      <p>Lista de amigos em breve...</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="marriedModal">
  <div class="modal-content">
    <span class="modal-close" onclick="cerrarMarried()">×</span>
    <div class="married-card">
      <div class="name">Gabr</div>
      <div class="message">Cada momento ao seu lado é um presente.</div>
    </div>
  </div>
</div>

<script>
// ===============================
//   TRAVAS DE SEGURANÇA
// ===============================
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = e => {
    if (e.keyCode == 123 || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
};

// Player Lógica
const playlist = [
    { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
    { name: "The Sound of Silence", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" }
];
let currentTrack = 0;
const audio = new Audio();
audio.volume = 0.5;

function loadTrack(idx) {
    audio.src = playlist[idx].url;
    document.getElementById('songName').innerText = playlist[idx].name;
}

function togglePlayer() { document.getElementById('playerDrop').classList.toggle('active'); }

document.getElementById('playPauseBtn').onclick = () => {
    if(audio.paused) { audio.play(); document.getElementById('playPauseBtn').innerText = '⏸'; }
    else { audio.pause(); document.getElementById('playPauseBtn').innerText = '▶'; }
};

document.getElementById('nextBtn').onclick = () => { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(currentTrack); audio.play(); };
document.getElementById('prevBtn').onclick = () => { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(currentTrack); audio.play(); };

audio.ontimeupdate = () => {
  if(audio.duration) document.getElementById('progress').value = (audio.currentTime / audio.duration) * 100;
};

document.getElementById('volumeSlider').oninput = (e) => { audio.volume = e.target.value; };

// Modais
function abrirGaleria() { document.getElementById('galeriaModal').classList.add('active'); }
function cerrarGaleria() { document.getElementById('galeriaModal').classList.remove('active'); }
function abrirAmigos() { document.getElementById('friendModal').classList.add('active'); }
function cerrarFriend() { document.getElementById('friendModal').classList.remove('active'); }
function abrirMarried() { document.getElementById('marriedModal').classList.add('active'); }
function cerrarMarried() { document.getElementById('marriedModal').classList.remove('active'); }

// Efeito Digitação
const textToType = "Quando tiver finalizado uma meta, não olhe para ela como a linha de chegada; olhe como o punto de partida para sua próxima conquista.";
let index = 0;
function typeWriter() {
  if (index < textToType.length) {
    document.getElementById("typingText").innerHTML += textToType.charAt(index);
    index++;
    setTimeout(typeWriter, 50);
  }
}

function enterSite() {
  document.getElementById("intro").style.display = "none";
  document.body.classList.add('entered');
  loadTrack(currentTrack);
  audio.play();
  typeWriter();
}

// Galeria Slider
const slides = document.querySelectorAll('.slide');
let currentSlide = 0;
function updateSlider() {
    slides.forEach((s, i) => {
        s.className = 'slide';
        if(i === currentSlide) s.classList.add('active');
        else if(i === (currentSlide - 1 + slides.length) % slides.length) s.classList.add('left');
        else if(i === (currentSlide + 1) % slides.length) s.classList.add('right');
    });
}
function next() { currentSlide = (currentSlide + 1) % slides.length; updateSlider(); }
function prev() { currentSlide = (currentSlide - 1 + slides.length) % slides.length; updateSlider(); }

// Efeitos de Mouse
document.addEventListener('mousemove', e => {
    let corazon = document.createElement("div");
    corazon.className = "corazon-xat";
    corazon.innerHTML = "❤";
    corazon.style.left = e.clientX + "px";
    corazon.style.top = e.clientY + "px";
    document.body.appendChild(corazon);
    setTimeout(() => corazon.remove(), 2000);
});

// Chuva de Corações (Canvas)
const canvas = document.getElementById('heartsCanvas');
const ctx = canvas.getContext('2d');
let hearts = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class ParticleHeart {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height - canvas.height;
    this.size = Math.random() * 8 + 4;
    this.speed = Math.random() * 2 + 1;
    this.opacity = Math.random() * 0.5 + 0.2;
  }
  update() {
    this.y += this.speed;
    if (this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.fillStyle = `rgba(255, 100, 100, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
    ctx.fill();
  }
}
for (let i = 0; i < 50; i++) hearts.push(new ParticleHeart());
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hearts.forEach(h => { h.update(); h.draw(); });
  requestAnimationFrame(animate);
}
animate();
loadTrack(currentTrack);
updateSlider();
</script>
</body>
</html>
