<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>XatSpace – Namee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ... (estilos anteriores mantidos) ... */

/* ALTERAÇÃO NA GALERIA: Efeito de Zoom */
.slide.active img {
  transition: transform .5s ease;
  cursor: zoom-in;
}

.slide.active:active img {
  transform: scale(1.3); /* Aplica o zoom ao clicar/segurar */
}

/* ... (resto do CSS mantido conforme original) ... */

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#6b0000,#7a0000,#910000);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.menu-left{
  position:absolute;
  left:-100px;       
  top:36%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:10;
}

.menu-left a{
  position:relative;
  width:110px;
  padding:10px 0;
  text-align:center;
  background:rgba(238, 29, 43, 0.712);
  backdrop-filter:blur(14px);
  border-radius:10px;
  border:1px solid rgba(241, 49, 49, 0.35); 
  font-size:13px;
  color:#fcdcdf;
  text-decoration:none;
  box-shadow: inset 0 0 1px rgba(250, 58, 58, 0.6), 0 4px 10px rgba(128, 40, 40, 0.25);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

.card{
  position:relative;
  width:420px;
  height:560px;
  border-radius:30px;
  background:rgba(216, 29, 29, 0.959);
  backdrop-filter:blur(20px);
  box-shadow:0 15px 10px rgba(141, 15, 15, 0.637);
  z-index:2;
  overflow:hidden; 
}

.card::before{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:22px;
  border:1.5px solid rgba(255,255,255,.75);
  pointer-events:none;
}

.avatar-wrap{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  width:160px;
  height:160px;
}

.avatar{
  position:relative;
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  border:4px solid rgba(255,255,255,.8);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  position:absolute;
  top:230px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Playfair Display',serif;
  font-size:28px;
  color:#ffe8e8;
}

.bio{
  position:absolute;
  top:315px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  white-space: pre-wrap;
  padding:14px 16px;
  font-size:11px;
  line-height:1.6;
  color:#fcf3f4;
  text-align:center;
  background:rgba(224, 102, 102, 0.596);
  backdrop-filter:blur(10px);
  border-radius:16px;
}

/* ALTERAÇÃO: FOTO REMOVIDA DA FIRMA */
.firma{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
}

.footer{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:8px;
  color:#fdeef0aa;
}

/* ... (modais e scripts mantidos conforme original) ... */
</style>
</head>
<body>

<div class="page-content">
  <div class="wrapper">
    <div class="menu-left">
      <a href="#" onclick="abrirMarried(); return false;">♡ Married ♡</a>
      <a href="#" onclick="abrirFriend(); return false;">♡ Friend ♡</a>
      <a href="#" onclick="abrirGaleria(); return false;">♡ Galeria ♡</a>
    </div>

    <div class="card">
      <div class="avatar-wrap">
        <div class="avatar">
          <img src="https://xatimg.com/image/2SsIaRqz6H3D.jpg">
        </div>
      </div>
      <div class="name">♥ Name ♥</div>
      <div class="bio">Ame e ponto. Não se preocupe demasiado com respostas.</div>
      <div class="firma">
        </div>
      <div class="footer">By: Gabr</div>
    </div>
  </div>

  <div class="modal-overlay" id="friendModal">
    <div class="modal-content">
      <span class="modal-close" onclick="cerrarFriend()">×</span>
      <div class="amigos-card">
        <div class="amigos-title">♡ amigos ♡</div>
        <div class="amigos-list">
          <div class="friend-item">
            <div class="friend-left">
              <div class="avatar">Na</div>
              <div class="friend-info"><div class="friend-name">Name</div><div class="friend-id">12345</div></div>
            </div>
            <a class="friend-btn" href="https://xat.me/12345" target="_blank">XAT.ME</a>
          </div>
          <div class="friend-item">
            <div class="friend-left">
              <div class="avatar">Na</div>
              <div class="friend-info"><div class="friend-name">Amigo 2</div><div class="friend-id">123456</div></div>
            </div>
            <a class="friend-btn" href="https://xat.me/123456" target="_blank">XAT.ME</a>
          </div>
          <div class="friend-item">
            <div class="friend-left">
              <div class="avatar">Na</div>
              <div class="friend-info"><div class="friend-name">Amigo 3</div><div class="friend-id">1234567</div></div>
            </div>
            <a class="friend-btn" href="https://xat.me/1234567" target="_blank">XAT.ME</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ... (todos os scripts de galeria e animações originais mantidos) ... */
</script>
</body>
</html>
